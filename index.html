<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Minecraft</title>
  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">
                
  <link rel="stylesheet" href="style.css" />
</head>
<body>

 <section id="landing-page" class="landing-page">

  <video autoplay muted loop playsinline class="bg-video">
    <source src="images/live_background.mp4" type="video/mp4">
  </video>

  <div class="landing-overlay"></div>

  <div class="menu-container">
    <img src="images/logo.png" alt="2D Minecraft Logo" class="logo">

    <button id="start-btn" class="menu-btn">Craft your Adventure</button>
    <button id="how-to-play-btn" class="menu-btn secondary-btn">Getting started</button>
  </div>

<div id="how-to-play-modal" class="modal">
      <div class="modal-content">
      <button id="close-modal-btn" class="close-btn">×</button>

      <ul class="rules-list">
        <li>
          <img src="images/axe.png" alt="Axe icon">
          <span>Use the Axe to collect trees.</span>
        </li>

        <li>
          <img src="images/pickaxe.png" alt="Pickaxe icon">
          <span>Use the Pickaxe to collect rocks.</span>
        </li>

        <li>
          <img src="images/shovel.png" alt="Shovel icon">
          <span>Use the Shovel to collect dirt.</span>
        </li>

        <li>
          <img src="images/inventory.png" alt="Inventory icon">
          <span>Collected blocks are saved in your inventory.</span>
        </li>
      </ul>
    </div>
  </div>

</section>

<section id="game-page" class="game-page hidden">

 <main class="game-layout">

  <aside class="toolbar">

  <div class="toolbar-actions">
    <button id="home-btn" class="action-btn" title="Back to Home">
      <img src="images/homepage.png" alt="Home">
    </button>

    <button id="reset-btn" class="action-btn" title="Reset World">
      <img src="images/reset.png" alt="Reset">
    </button>
  </div>

    <h2>Tools</h2>

    <button class="tool" data-tool="axe">
      <img src="images/axe.png" alt="Axe icon">
      <span>Axe</span>
    </button>

    <button class="tool" data-tool="pickaxe">
      <img src="images/pickaxe.png" alt="Pickaxe icon">
      <span>Pickaxe</span>
    </button>

    <button class="tool" data-tool="shovel">
      <img src="images/shovel.png" alt="Shovel icon">
      <span>Shovel</span>
    </button>

    <button class="tool" data-tool="inventory">
      <img src="images/inventory.png" alt="inventory icon">
      <span>inventory</span>
    </button>
  </aside>

  <section class="world-section">
    <div id="world" class="world"></div>
  </section>

</main>
</section>
  <script src="js/script.js"></script>
</body>
</html>
